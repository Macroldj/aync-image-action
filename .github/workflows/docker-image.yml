name: Docker Image CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:

  build:

    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: run bash script
      env:
        DHI_USER: ${{ secrets.DHI_USER }}
        DHI_PWD: ${{ secrets.DHI_PWD }}
      run: |
        echo "${DHI_PWD}" | docker login dhi.io -u $DHI_USER --password-stdin
        docker login --username=15682816850 registry.cn-hangzhou.aliyuncs.com --password=${{ secrets.PASSWORD }}
        bash sync.sh
